databaseChangeLog:
  - changeSet:
      id: 004-create-password-reset-tokens-table
      author: system
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: version
                  type: bigint

        - createIndex:
            indexName: idx_password_reset_tokens_token
            tableName: password_reset_tokens
            columns:
              - column:
                  name: token

        - createIndex:
            indexName: idx_password_reset_tokens_user_id
            tableName: password_reset_tokens
            columns:
              - column:
                  name: user_id

        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            constraintName: fk_password_reset_tokens_user_account
            referencedTableName: user_accounts
            referencedColumnNames: id
            onDelete: CASCADE
