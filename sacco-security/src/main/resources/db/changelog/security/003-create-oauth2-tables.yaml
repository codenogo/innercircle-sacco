databaseChangeLog:
  - changeSet:
      id: 003-create-oauth2-registered-client
      author: system
      changes:
        - createTable:
            tableName: oauth2_registered_client
            columns:
              - column:
                  name: id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: client_id_issued_at
                  type: timestamp with time zone
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: client_secret
                  type: varchar(200)
              - column:
                  name: client_secret_expires_at
                  type: timestamp with time zone
              - column:
                  name: client_name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: client_authentication_methods
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: authorization_grant_types
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: redirect_uris
                  type: varchar(1000)
              - column:
                  name: post_logout_redirect_uris
                  type: varchar(1000)
              - column:
                  name: scopes
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: client_settings
                  type: varchar(2000)
                  constraints:
                    nullable: false
              - column:
                  name: token_settings
                  type: varchar(2000)
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-oauth2-authorization
      author: system
      changes:
        - createTable:
            tableName: oauth2_authorization
            columns:
              - column:
                  name: id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: registered_client_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: principal_name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: authorization_grant_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: authorized_scopes
                  type: varchar(1000)
              - column:
                  name: attributes
                  type: text
              - column:
                  name: state
                  type: varchar(500)
              - column:
                  name: authorization_code_value
                  type: text
              - column:
                  name: authorization_code_issued_at
                  type: timestamp with time zone
              - column:
                  name: authorization_code_expires_at
                  type: timestamp with time zone
              - column:
                  name: authorization_code_metadata
                  type: text
              - column:
                  name: access_token_value
                  type: text
              - column:
                  name: access_token_issued_at
                  type: timestamp with time zone
              - column:
                  name: access_token_expires_at
                  type: timestamp with time zone
              - column:
                  name: access_token_metadata
                  type: text
              - column:
                  name: access_token_type
                  type: varchar(100)
              - column:
                  name: access_token_scopes
                  type: varchar(1000)
              - column:
                  name: oidc_id_token_value
                  type: text
              - column:
                  name: oidc_id_token_issued_at
                  type: timestamp with time zone
              - column:
                  name: oidc_id_token_expires_at
                  type: timestamp with time zone
              - column:
                  name: oidc_id_token_metadata
                  type: text
              - column:
                  name: refresh_token_value
                  type: text
              - column:
                  name: refresh_token_issued_at
                  type: timestamp with time zone
              - column:
                  name: refresh_token_expires_at
                  type: timestamp with time zone
              - column:
                  name: refresh_token_metadata
                  type: text
              - column:
                  name: user_code_value
                  type: text
              - column:
                  name: user_code_issued_at
                  type: timestamp with time zone
              - column:
                  name: user_code_expires_at
                  type: timestamp with time zone
              - column:
                  name: user_code_metadata
                  type: text
              - column:
                  name: device_code_value
                  type: text
              - column:
                  name: device_code_issued_at
                  type: timestamp with time zone
              - column:
                  name: device_code_expires_at
                  type: timestamp with time zone
              - column:
                  name: device_code_metadata
                  type: text

  - changeSet:
      id: 003-create-oauth2-authorization-consent
      author: system
      changes:
        - createTable:
            tableName: oauth2_authorization_consent
            columns:
              - column:
                  name: registered_client_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: principal_name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: authorities
                  type: varchar(1000)
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: oauth2_authorization_consent
            columnNames: registered_client_id, principal_name
            constraintName: pk_oauth2_authorization_consent
