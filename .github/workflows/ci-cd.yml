name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ECR_REGISTRY: 738754313966.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPO: innercircle-sacco
  AWS_REGION: eu-west-2
  INSTANCE_ID: i-0eedb91249a9a6be4

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B -pl '!sacco-investment'

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          docker build -t $ECR_REGISTRY/$ECR_REPO:$SHORT_SHA -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:$SHORT_SHA
          docker push $ECR_REGISTRY/$ECR_REPO:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'ECR_REGISTRY=738754313966.dkr.ecr.eu-west-2.amazonaws.com',
              'ECR_REPO=innercircle-sacco',
              'IMAGE_TAG=${SHORT_SHA}',
              'aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin \$ECR_REGISTRY',
              'docker pull \$ECR_REGISTRY/\$ECR_REPO:\$IMAGE_TAG',
              'cd /home/ubuntu/apps/innercircle-sacco',
              'docker compose -f docker-compose.deploy.yml down --timeout 30 2>/dev/null || true',
              'DOCKER_IMAGE=\$ECR_REGISTRY/\$ECR_REPO:\$IMAGE_TAG docker compose -f docker-compose.deploy.yml up -d',
              'echo Waiting for app to start...',
              'for i in \$(seq 1 24); do if curl -sf http://localhost:8083/actuator/health > /dev/null 2>&1; then echo App is healthy! && exit 0; fi; echo Attempt \$i/24...; sleep 5; done',
              'echo ERROR: Health check failed',
              'docker compose -f docker-compose.deploy.yml logs --tail=30',
              'exit 1'
            ]" \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded!"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed: $STATUS"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out"
          exit 1
