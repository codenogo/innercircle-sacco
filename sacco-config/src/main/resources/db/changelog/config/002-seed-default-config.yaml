databaseChangeLog:
  - changeSet:
      id: 002-seed-system-configs
      author: innercircle
      changes:
        - insert:
            tableName: system_configs
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: config_key
                  value: "chama.name"
              - column:
                  name: config_value
                  value: "Inner Circle Chama"
              - column:
                  name: description
                  value: "Name of the chama organization"
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"
        - insert:
            tableName: system_configs
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: config_key
                  value: "chama.currency"
              - column:
                  name: config_value
                  value: "KES"
              - column:
                  name: description
                  value: "Default currency for all transactions"
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"
        - insert:
            tableName: system_configs
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: config_key
                  value: "chama.financial_year_start_month"
              - column:
                  name: config_value
                  value: "1"
              - column:
                  name: description
                  value: "Month when financial year starts (1=January)"
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"

  - changeSet:
      id: 002-seed-contribution-schedules
      author: innercircle
      changes:
        - insert:
            tableName: contribution_schedule_configs
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: "Monthly Contribution"
              - column:
                  name: frequency
                  value: "MONTHLY"
              - column:
                  name: amount
                  value: "1000.00"
              - column:
                  name: penalty_enabled
                  valueBoolean: true
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"

  - changeSet:
      id: 002-seed-loan-products
      author: innercircle
      changes:
        - insert:
            tableName: loan_product_configs
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: "Personal Loan"
              - column:
                  name: interest_method
                  value: "REDUCING_BALANCE"
              - column:
                  name: annual_interest_rate
                  value: "12.00"
              - column:
                  name: max_term_months
                  value: "12"
              - column:
                  name: max_amount
                  value: "100000.00"
              - column:
                  name: requires_guarantor
                  valueBoolean: true
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"
        - insert:
            tableName: loan_product_configs
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: "Emergency Loan"
              - column:
                  name: interest_method
                  value: "FLAT_RATE"
              - column:
                  name: annual_interest_rate
                  value: "10.00"
              - column:
                  name: max_term_months
                  value: "6"
              - column:
                  name: max_amount
                  value: "50000.00"
              - column:
                  name: requires_guarantor
                  valueBoolean: false
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"

  - changeSet:
      id: 002-seed-penalty-rules
      author: innercircle
      changes:
        - insert:
            tableName: penalty_rules
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: "Late Contribution Penalty"
              - column:
                  name: penalty_type
                  value: "LATE_CONTRIBUTION"
              - column:
                  name: rate
                  value: "5.00"
              - column:
                  name: calculation_method
                  value: "PERCENTAGE"
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"
        - insert:
            tableName: penalty_rules
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: "Loan Default Penalty"
              - column:
                  name: penalty_type
                  value: "LOAN_DEFAULT"
              - column:
                  name: rate
                  value: "3.00"
              - column:
                  name: calculation_method
                  value: "PERCENTAGE"
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  valueComputed: "CURRENT_TIMESTAMP"
