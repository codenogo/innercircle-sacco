databaseChangeLog:
  - changeSet:
      id: 006-add-account-member-fields
      author: claude
      changes:
        - addColumn:
            tableName: accounts
            columns:
              - column:
                  name: parent_account_code
                  type: varchar(20)
              - column:
                  name: member_id
                  type: uuid
        - createIndex:
            indexName: idx_account_member_id
            tableName: accounts
            columns:
              - column:
                  name: member_id
        - createIndex:
            indexName: idx_account_parent_code
            tableName: accounts
            columns:
              - column:
                  name: parent_account_code
