databaseChangeLog:
  - changeSet:
      id: 001-create-accounts-table
      author: claude
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_code
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: account_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: account_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: decimal(19,2)
                  defaultValue: "0.00"
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)

        - createIndex:
            indexName: idx_account_code
            tableName: accounts
            columns:
              - column:
                  name: account_code

        - createIndex:
            indexName: idx_account_type
            tableName: accounts
            columns:
              - column:
                  name: account_type

  - changeSet:
      id: 001-create-journal-entries-table
      author: claude
      changes:
        - createTable:
            tableName: journal_entries
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entry_number
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: transaction_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_type
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: reference_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: posted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: posted_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)

        - createIndex:
            indexName: idx_entry_number
            tableName: journal_entries
            columns:
              - column:
                  name: entry_number

        - createIndex:
            indexName: idx_transaction_date
            tableName: journal_entries
            columns:
              - column:
                  name: transaction_date

        - createIndex:
            indexName: idx_reference_id
            tableName: journal_entries
            columns:
              - column:
                  name: reference_id

        - createIndex:
            indexName: idx_posted
            tableName: journal_entries
            columns:
              - column:
                  name: posted

  - changeSet:
      id: 001-create-journal-lines-table
      author: claude
      changes:
        - createTable:
            tableName: journal_lines
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: journal_entry_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: debit_amount
                  type: decimal(19,2)
                  defaultValue: "0.00"
                  constraints:
                    nullable: false
              - column:
                  name: credit_amount
                  type: decimal(19,2)
                  defaultValue: "0.00"
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)

        - addForeignKeyConstraint:
            baseTableName: journal_lines
            baseColumnNames: journal_entry_id
            constraintName: fk_journal_lines_entry
            referencedTableName: journal_entries
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: journal_lines
            baseColumnNames: account_id
            constraintName: fk_journal_lines_account
            referencedTableName: accounts
            referencedColumnNames: id

        - createIndex:
            indexName: idx_journal_entry_id
            tableName: journal_lines
            columns:
              - column:
                  name: journal_entry_id

        - createIndex:
            indexName: idx_account_id
            tableName: journal_lines
            columns:
              - column:
                  name: account_id
