server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: innercircle-sacco

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sacco_db}
    username: ${DB_USERNAME:sacco}
    password: ${DB_PASSWORD:sacco}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

oauth2:
  jwt:
    rsa:
      public-key: ${OAUTH2_RSA_PUBLIC_KEY:}
      private-key: ${OAUTH2_RSA_PRIVATE_KEY:}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

sacco:
  mail:
    from: ${MAIL_FROM:noreply@innercircle-sacco.com}
    password-reset-url: ${PASSWORD_RESET_URL:http://localhost:3000/reset-password}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
