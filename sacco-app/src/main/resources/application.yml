server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: innercircle-sacco

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sacco_db}
    username: ${DB_USERNAME:sacco}
    password: ${DB_PASSWORD:sacco}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

oauth2:
  client:
    web-app:
      secret: ${OAUTH2_WEB_SECRET:changeme}
    batch-client:
      secret: ${OAUTH2_BATCH_SECRET:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
