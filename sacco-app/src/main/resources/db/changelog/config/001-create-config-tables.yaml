databaseChangeLog:
  - changeSet:
      id: 001-create-system-configs-table
      author: innercircle
      changes:
        - createTable:
            tableName: system_configs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: config_key
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: config_value
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
        - createIndex:
            indexName: idx_system_configs_key
            tableName: system_configs
            columns:
              - column:
                  name: config_key

  - changeSet:
      id: 001-create-loan-product-configs-table
      author: innercircle
      changes:
        - createTable:
            tableName: loan_product_configs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: interest_method
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: annual_interest_rate
                  type: decimal(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: max_term_months
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: max_amount
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: requires_guarantor
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
        - createIndex:
            indexName: idx_loan_product_configs_active
            tableName: loan_product_configs
            columns:
              - column:
                  name: active

  - changeSet:
      id: 001-create-contribution-schedule-configs-table
      author: innercircle
      changes:
        - createTable:
            tableName: contribution_schedule_configs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: frequency
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: penalty_enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
        - createIndex:
            indexName: idx_contribution_schedule_configs_active
            tableName: contribution_schedule_configs
            columns:
              - column:
                  name: active

  - changeSet:
      id: 001-create-penalty-rules-table
      author: innercircle
      changes:
        - createTable:
            tableName: penalty_rules
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: penalty_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: rate
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: calculation_method
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
        - createIndex:
            indexName: idx_penalty_rules_type_active
            tableName: penalty_rules
            columns:
              - column:
                  name: penalty_type
              - column:
                  name: active
