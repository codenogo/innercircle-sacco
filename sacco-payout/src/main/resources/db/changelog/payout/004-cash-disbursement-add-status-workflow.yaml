databaseChangeLog:
  - changeSet:
      id: 004-cash-disbursement-add-status-workflow
      author: system
      changes:
        - addColumn:
            tableName: cash_disbursements
            columns:
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
        - addColumn:
            tableName: cash_disbursements
            columns:
              - column:
                  name: approved_by
                  type: varchar(255)
        - addColumn:
            tableName: cash_disbursements
            columns:
              - column:
                  name: approved_at
                  type: timestamp
