databaseChangeLog:
  - changeSet:
      id: 001-create-payouts-table
      author: system
      changes:
        - createTable:
            tableName: payouts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: approved_by
                  type: varchar(100)
              - column:
                  name: processed_at
                  type: timestamp
              - column:
                  name: reference_number
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)
        - createIndex:
            indexName: idx_payouts_member_id
            tableName: payouts
            columns:
              - column:
                  name: member_id
        - createIndex:
            indexName: idx_payouts_status
            tableName: payouts
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_payouts_type
            tableName: payouts
            columns:
              - column:
                  name: type
        - createIndex:
            indexName: idx_payouts_reference_number
            tableName: payouts
            columns:
              - column:
                  name: reference_number

  - changeSet:
      id: 002-create-bank-withdrawals-table
      author: system
      changes:
        - createTable:
            tableName: bank_withdrawals
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: bank_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: account_number
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: reference_number
                  type: varchar(100)
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_date
                  type: date
              - column:
                  name: reconciled
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)
        - createIndex:
            indexName: idx_bank_withdrawals_member_id
            tableName: bank_withdrawals
            columns:
              - column:
                  name: member_id
        - createIndex:
            indexName: idx_bank_withdrawals_status
            tableName: bank_withdrawals
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_bank_withdrawals_reconciled
            tableName: bank_withdrawals
            columns:
              - column:
                  name: reconciled
        - createIndex:
            indexName: idx_bank_withdrawals_transaction_date
            tableName: bank_withdrawals
            columns:
              - column:
                  name: transaction_date

  - changeSet:
      id: 003-create-cash-disbursements-table
      author: system
      changes:
        - createTable:
            tableName: cash_disbursements
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: received_by
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: disbursed_by
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: signoff_by
                  type: varchar(100)
              - column:
                  name: receipt_number
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: disbursement_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)
        - createIndex:
            indexName: idx_cash_disbursements_member_id
            tableName: cash_disbursements
            columns:
              - column:
                  name: member_id
        - createIndex:
            indexName: idx_cash_disbursements_disbursement_date
            tableName: cash_disbursements
            columns:
              - column:
                  name: disbursement_date
        - createIndex:
            indexName: idx_cash_disbursements_receipt_number
            tableName: cash_disbursements
            columns:
              - column:
                  name: receipt_number

  - changeSet:
      id: 004-create-share-withdrawals-table
      author: system
      changes:
        - createTable:
            tableName: share_withdrawals
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: member_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: withdrawal_type
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: current_share_balance
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: new_share_balance
                  type: decimal(19,2)
              - column:
                  name: approved_by
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(100)
        - createIndex:
            indexName: idx_share_withdrawals_member_id
            tableName: share_withdrawals
            columns:
              - column:
                  name: member_id
        - createIndex:
            indexName: idx_share_withdrawals_status
            tableName: share_withdrawals
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_share_withdrawals_type
            tableName: share_withdrawals
            columns:
              - column:
                  name: withdrawal_type
