databaseChangeLog:
  - changeSet:
      id: common-004-create-event-dead-letter-table
      author: claude
      comment: "Event hardening: Create event_dead_letter table for failed event retry tracking"
      changes:
        - createTable:
            tableName: event_dead_letter
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: outbox_id
                  type: uuid
                  constraints:
                    unique: true
                    foreignKeyName: fk_dead_letter_outbox
                    references: event_outbox(id)
              - column:
                  name: event_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: correlation_id
                  type: uuid
              - column:
                  name: payload
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
              - column:
                  name: retries
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: max_retries
                  type: int
                  defaultValueNumeric: 5
                  constraints:
                    nullable: false
              - column:
                  name: next_retry_at
                  type: timestamp
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: "PENDING_RETRY"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: last_retry_at
                  type: timestamp
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: event_dead_letter
